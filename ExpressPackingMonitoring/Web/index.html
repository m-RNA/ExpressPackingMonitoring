<body>
<div class="page">
  <header class="topbar"><div class="title-block"><h1>快递打包录像回放</h1><p>按日期或订单号检索局域网监控端录像，支持在线播放、转码预览和文件下载。</p></div><div class="top-actions"><a class="install-card" href="/kuaidizs-install-guide" target="_blank" rel="noopener"><span class="install-icon" data-icon="printer"></span><span class="install-copy"><span class="install-title">安装订单备注插件</span><span class="install-desc">播报买家留言和卖家备注</span></span></a><label class="compat-toggle" for="compatModeToggle"><span class="compat-copy"><span class="compat-title">播放兼容模式</span><span class="compat-desc" id="compatModeText">开启后可兼容更多手机和浏览器</span></span><span class="switch"><input type="checkbox" id="compatModeToggle" checked><span class="slider"></span></span></label><button class="theme-toggle" id="themeToggle" type="button" aria-label="切换到深色" title="切换到深色"><span data-icon="moon"></span></button></div></header>
  <section class="overview" aria-label="录像保留情况">
    <article class="summary-card"><div><div class="summary-head"><span class="summary-icon" data-icon="calendar"></span><span>当前可追溯到</span></div><div class="summary-main" id="oldestValue">加载中</div></div><div class="summary-note" id="oldestNote">正在读取录像存储情况</div></article>
    <article class="summary-card"><div><div class="summary-head"><span class="summary-icon" data-icon="clock"></span><span>预计可保留</span></div><div class="summary-main" id="retentionValue">加载中</div></div><div class="summary-note" id="retentionNote">估算值仅供参考</div></article>

function renderStorageOverview(d){if(!d||!d.oldestVideoTime){text('oldestValue','暂无录像数据');text('oldestNote','当前存储库未找到可用录像')}else{text('oldestValue',formatDateOnly(d.oldestVideoTime));text('oldestNote','已保存约 '+(d.savedDays||1)+' 天录像'+(d.latestVideoTime?'，最新 '+d.latestVideoTime:''))}if(d&&d.estimatedRetentionDays){text('retentionValue','约 '+d.estimatedRetentionDays+' 天');text('retentionNote',(d.estimateBasis||'基于当前录像占用估算')+(d.avgGBPerDay?'，平均约 '+d.avgGBPerDay+'GB / 天':''))}else{text('retentionValue','暂无法估算');text('retentionNote','历史数据不足或平均每日占用为 0')}const used=Number(d&&d.usedGB||0),total=Number(d&&d.totalGB||0),free=Number(d&&d.freeGB||0),pct=total>0?Math.max(0,Math.min(100,used/total*100)):0;text('storageValue','已用 '+formatGB(used)+' / '+formatGB(total));text('storageNote',(d&&d.pathCount>1?'共 '+d.pathCount+' 个存储目录，':'')+'剩余 '+formatGB(free));document.getElementById('storageProgress').style.width=pct.toFixed(1)+'%'}
function initSearchAutoRefresh(){const keyword=document.getElementById('keyword'),start=document.getElementById('startDate'),end=document.getElementById('endDate');if(keyword)keyword.addEventListener('input',()=>scheduleSearch());if(start)start.addEventListener('change',()=>scheduleSearch(0));if(end)end.addEventListener('change',()=>scheduleSearch(0))}function scheduleSearch(delay=250){clearTimeout(searchTimer);searchTimer=setTimeout(()=>doSearch(1),delay)}

function createVideoItem(v){const item=document.createElement('article');item.className='video-item'+(v.exists?'':' missing');item.title=buildVideoTooltip(v);const orderCol=document.createElement('div'),line=document.createElement('div');line.className='order-line';const badge=document.createElement('span');badge.className='mode-badge'+(v.mode==='退货'?' return':'');badge.textContent=v.mode||'发货';const order=document.createElement('div');order.className='order-id';order.title=v.orderId||'';order.textContent=v.orderId||'未记录订单号';const status=document.createElement('div');status.className='status-badge'+(v.exists?'':' missing');status.textContent=v.exists?'文件存在':'文件丢失';status.title=v.exists?'录像文件可播放、剪辑和下载':'监控端未在记录的文件位置找到录像，可能已被移动、删除或清理。\n文件位置：'+(v.filePath||v.fileName||'未记录');line.append(badge,order,status);orderCol.append(line);const meta=document.createElement('div');meta.className='meta-grid';addMeta(meta,'calendar',v.startTime||'-');addMeta(meta,'time',v.duration||formatDuration(v.durationSec));addMeta(meta,'size',formatSize(v.sizeMB));const actions=document.createElement('div');actions.className='video-actions';const play=actionButton('play','播放','btn-play',()=>playVideo(v.id,v.orderId||v.fileName||'录像预览',v.videoCodec)),clip=actionButton('scissors','剪辑','',()=>openClipDialog(v)),down=actionButton('download','下载','',()=>downloadVideo(v.id));if(!v.exists){play.disabled=true;clip.disabled=true;down.disabled=true;play.title=clip.title=down.title='文件丢失'}actions.append(play,clip,down);item.append(orderCol,meta,actions);mountIcons(item);return item}
function buildVideoTooltip(v){const lines=[];const add=(label,value)=>{if(value!==undefined&&value!==null&&String(value).trim())lines.push(label+'：'+String(value).trim())};add('订单号',v.orderId);add('原始订单号',v.sourceOrderId);add('快递单号',v.trackingNumber);add('买家留言',v.buyerMessage);add('卖家备注',v.sellerMemo);add('商品信息',v.productInfo);add('订单信息推送时间',v.orderInfoPushTime);if(v.videoCodec){const codecName=String(v.videoCodec).toUpperCase();add('视频编码',codecName);if(String(v.videoCodec).toLowerCase()!=='h264')add('播放提示',playbackCompatMode?'会转码为 H.264 兼容播放':'若无法播放请开启兼容模式')}if(!v.exists)add('丢失原因','监控端未在记录的文件位置找到录像，可能已被移动、删除或清理');add('文件位置',v.filePath||v.fileName);return lines.join('\n')}
function addMeta(parent,icon,value){const cell=document.createElement('div');cell.className='meta-cell';const i=document.createElement('span');i.dataset.icon=icon;const s=document.createElement('span');s.className='text';s.title=value;s.textContent=value;cell.append(i,s);parent.appendChild(cell)}function actionButton(icon,label,extra,onClick){const btn=document.createElement('button');btn.type='button';btn.className='btn btn-sm '+extra;btn.innerHTML=(icons[icon]||'')+'<span></span>';btn.querySelector('span:last-child').textContent=label;btn.addEventListener('click',onClick);return btn}function formatSize(sizeMB){const mb=Number(sizeMB||0);return mb>=1024?(mb/1024).toFixed(1)+'GB':mb.toFixed(mb>=10?0:1)+'MB'}

async function playVideo(id,title,videoCodec){const player=document.getElementById('videoPlayer'),codec=String(videoCodec||'').toLowerCase(),hint=codec&&codec!=='h264'?(playbackCompatMode?'将转码为 H.264 兼容播放':'无法播放时请开启兼容模式'):'';clearPlayerMessage();setPlayerTitle(title,hint);document.getElementById('playerOverlay').classList.add('active');showPlayerMessage('正在准备视频，请稍候...');try{player.src=await resolvePlaybackUrl(id);clearPlayerMessage();await player.play()}catch(e){showPlayerMessage(friendlyFetchError(e,'视频准备失败，请稍后重试。'))}}
function showTranscodeConfirm(message){const overlay=document.getElementById('transcodeConfirmOverlay'),msg=document.getElementById('transcodeConfirmMessage'),skip=document.getElementById('transcodeSkipConfirm'),cancel=document.getElementById('transcodeCancelBtn'),cont=document.getElementById('transcodeContinueBtn');msg.textContent=message;skip.checked=false;overlay.classList.add('active');return new Promise(resolve=>{const finish=ok=>{overlay.classList.remove('active');overlay.onclick=cancel.onclick=cont.onclick=null;resolve({ok,skip:skip.checked})};overlay.onclick=()=>finish(false);cancel.onclick=()=>finish(false);cont.onclick=()=>finish(true)})}
function openClipDialog(v){const total=Math.max(1,Number(v.durationSec||1)),draft=loadClipDraft(v.id,total),player=document.getElementById('clipSourcePlayer');clipState={video:v,total,start:draft.start,end:draft.end,playhead:draft.start,dragSide:'',dragPointerId:null,dragFrameId:0,dragPendingValue:null,taskId:null,generationId:0,busy:false,cancelRequested:false,sourceReady:false,selectionPlaying:false,downloadUrl:''};document.getElementById('clipError').classList.remove('active');document.getElementById('clipDownloadStatus').textContent='';document.getElementById('clipSubmitText').textContent='生成并下载';document.getElementById('clipDialogWrap').classList.remove('busy');document.getElementById('clipOverlay').classList.add('active');setClipSourceStatus('正在加载原视频……');updateClipUi();setTimelineLoading();loadClipTimeline();player.removeAttribute('src');player.load();resolvePlaybackUrl(v.id).then(url=>{if(!clipState||clipState.video!==v)return;player.src=url;player.load()}).catch(err=>{if(!clipState||clipState.video!==v)return;setClipSourceStatus(friendlyFetchError(err,'原视频加载失败，仍可设置范围并生成剪辑'));showClipError(friendlyFetchError(err,'原视频加载失败'))})}
function setClipBoundary(which,value,commit){if(!clipState)return;const minGap=1,total=clipState.total;let next=Math.max(0,Math.min(Number(value)||0,total));if(which==='start')clipState.start=Math.min(next,clipState.end-minGap);else clipState.end=Math.max(next,clipState.start+minGap);clipState.start=Math.max(0,Math.min(clipState.start,total-minGap));clipState.end=Math.max(clipState.start+minGap,Math.min(clipState.end,total));invalidateClipResult();pauseClipSource();seekClipSource(which==='start'?clipState.start:clipState.end);updateClipUi();if(commit!==false)saveClipDraft()}
function invalidateClipResult(){if(!clipState||!clipState.downloadUrl)return;clipState.downloadUrl='';text('clipSubmitText','生成并下载');document.getElementById('clipDownloadStatus').textContent='范围已调整，请重新生成'}
function seekClipSource(value){if(!clipState)return;const next=Math.max(0,Math.min(Number(value)||0,clipState.total));clipState.playhead=next;const player=document.getElementById('clipSourcePlayer');if(clipState.sourceReady&&Math.abs(player.currentTime-next)>.015)try{player.currentTime=next}catch{}updateClipPlayhead(next)}
function beginClipHandleDrag(which,event){if(!clipState||clipState.busy)return;clipState.dragSide=which;clipState.dragPointerId=event.pointerId;clipState.dragPendingValue=null;pauseClipSource();event.currentTarget.setPointerCapture?.(event.pointerId);event.stopPropagation();event.preventDefault();if(which==='playhead')seekClipSource(clipPointerSeconds(event));else setClipBoundary(which,which==='start'?clipState.start:clipState.end,false)}
function clipPointerSeconds(event){const rect=document.getElementById('clipTimeline').getBoundingClientRect(),ratio=Math.max(0,Math.min(1,(event.clientX-rect.left)/rect.width));return ratio*(clipState?clipState.total:0)}
function applyClipDragValue(state,side,value,commit){if(side==='playhead')seekClipSource(value);else setClipBoundary(side,value,commit)}
function onClipHandlePointerMove(event){if(!clipState||!clipState.dragSide||event.pointerId!==clipState.dragPointerId)return;const state=clipState;state.dragPendingValue=clipPointerSeconds(event);if(state.dragFrameId)return;state.dragFrameId=requestAnimationFrame(()=>{if(clipState!==state)return;state.dragFrameId=0;const value=state.dragPendingValue;state.dragPendingValue=null;if(value!==null)applyClipDragValue(state,state.dragSide,value,false)})}
function endClipHandleDrag(event){if(!clipState||!clipState.dragSide||event.pointerId!==clipState.dragPointerId)return;const state=clipState,side=state.dragSide;if(state.dragFrameId){cancelAnimationFrame(state.dragFrameId);state.dragFrameId=0}if(state.dragPendingValue!==null)applyClipDragValue(state,side,state.dragPendingValue,false);state.dragPendingValue=null;state.dragSide='';state.dragPointerId=null;if(side!=='playhead')saveClipDraft()}
function onClipHandleKey(which,event){if(!clipState)return;let value=which==='start'?clipState.start:which==='end'?clipState.end:clipState.playhead,handled=true,step=event.shiftKey?5:.1;if(event.key==='ArrowLeft'||event.key==='ArrowDown')value-=step;else if(event.key==='ArrowRight'||event.key==='ArrowUp')value+=step;else if(event.key==='Home')value=which==='end'?clipState.start+1:0;else if(event.key==='End')value=which==='start'?clipState.end-1:clipState.total;else handled=false;if(!handled)return;event.preventDefault();if(which==='playhead'){pauseClipSource();seekClipSource(value)}else setClipBoundary(which,value)}
function updateClipUi(){if(!clipState)return;const pctStart=clipState.total>0?clipState.start/clipState.total*100:0,pctEnd=clipState.total>0?clipState.end/clipState.total*100:100,bar=document.getElementById('clipRangeBar'),startHandle=document.getElementById('clipStartHandle'),endHandle=document.getElementById('clipEndHandle');bar.style.left=pctStart+'%';bar.style.width=Math.max(0,pctEnd-pctStart)+'%';startHandle.style.left=pctStart+'%';endHandle.style.left=pctEnd+'%';startHandle.setAttribute('aria-valuemin','0');startHandle.setAttribute('aria-valuemax',String(Math.max(0,clipState.end-1)));endHandle.setAttribute('aria-valuemin',String(Math.min(clipState.total,clipState.start+1)));endHandle.setAttribute('aria-valuemax',String(clipState.total));startHandle.setAttribute('aria-valuenow',String(clipState.start));endHandle.setAttribute('aria-valuenow',String(clipState.end));startHandle.setAttribute('aria-valuetext',formatClipTime(clipState.start));endHandle.setAttribute('aria-valuetext',formatClipTime(clipState.end));text('clipRangeText',formatClipTime(clipState.start)+' – '+formatClipTime(clipState.end));text('clipDurationText',formatClipTime(clipState.end-clipState.start));document.getElementById('clipStartTime').value=formatClipTime(clipState.start);document.getElementById('clipEndTime').value=formatClipTime(clipState.end);updateClipPlayhead(clipState.playhead)}
function updateClipPlayhead(value){if(!clipState)return;const playhead=document.getElementById('clipPlayhead'),next=Math.max(0,Math.min(Number(value)||0,clipState.total)),pct=clipState.total>0?next/clipState.total*100:0;clipState.playhead=next;playhead.style.left=pct+'%';playhead.setAttribute('aria-valuemax',String(clipState.total));playhead.setAttribute('aria-valuenow',String(next));playhead.setAttribute('aria-valuetext',formatClipTime(next));text('clipPreviewLabel','播放位置 · '+formatClipTime(next))}
function formatClipTime(value){const tenths=Math.max(0,Math.round(Number(value||0)*10)),whole=Math.floor(tenths/10),fraction=tenths%10,base=formatDuration(whole);return fraction>0?base+'.'+fraction:base}
function parseClipTime(value){const parts=String(value||'').trim().split(':');if(parts.length<1||parts.length>3||parts.some(x=>x.trim()===''||!Number.isFinite(Number(x))))return NaN;let seconds=0;for(const part of parts)seconds=seconds*60+Number(part);return seconds}
function applyClipTimeInput(which){if(!clipState)return;const input=document.getElementById(which==='start'?'clipStartTime':'clipEndTime'),value=parseClipTime(input.value);if(!Number.isFinite(value)){showClipError('请输入 mm:ss 或 hh:mm:ss 格式的时间');updateClipUi();return}setClipBoundary(which,value);document.getElementById('clipError').classList.remove('active')}
function setClipSourceStatus(message){const status=document.getElementById('clipPreviewStatus');status.textContent=message;status.hidden=!message}
function onClipSourceLoaded(){if(!clipState)return;const player=document.getElementById('clipSourcePlayer');if(Number.isFinite(player.duration)&&player.duration>0){clipState.total=player.duration;const minGap=1;clipState.start=Math.max(0,Math.min(clipState.start,clipState.total-minGap));clipState.end=Math.max(clipState.start+minGap,Math.min(clipState.end,clipState.total))}clipState.sourceReady=true;if(player.videoWidth&&player.videoHeight)player.parentElement.style.aspectRatio=player.videoWidth+'/'+player.videoHeight;setClipSourceStatus('');seekClipSource(clipState.start);updateClipUi()}
function onClipSourceError(){if(!clipState)return;clipState.sourceReady=false;setClipSourceStatus('原视频无法播放，仍可设置范围并生成剪辑');showClipError('原视频加载失败，请尝试开启播放兼容模式')}
function onClipSourceTimeUpdate(){if(!clipState)return;const player=document.getElementById('clipSourcePlayer'),current=Math.max(0,Math.min(player.currentTime||0,clipState.total));updateClipPlayhead(current);if(clipState.selectionPlaying&&current>=clipState.end-.04){player.pause();clipState.selectionPlaying=false;try{player.currentTime=clipState.end}catch{}updateClipPlayhead(clipState.end);setClipPlaying(false)}}
function setClipPlaying(playing){if(!clipState)return;text('clipPlaySelectionText',playing?'暂停':'播放选区')}
function pauseClipSource(){const player=document.getElementById('clipSourcePlayer');if(!player.paused)player.pause();if(clipState)clipState.selectionPlaying=false;setClipPlaying(false)}
async function toggleClipSelectionPlayback(){if(!clipState||clipState.busy)return;const player=document.getElementById('clipSourcePlayer');if(!clipState.sourceReady){showClipError('原视频尚未准备好，请稍后重试');return}if(!player.paused){pauseClipSource();return}if(player.currentTime<clipState.start||player.currentTime>=clipState.end-.04)seekClipSource(clipState.start);clipState.selectionPlaying=true;try{await player.play()}catch(err){clipState.selectionPlaying=false;setClipPlaying(false);showClipError(friendlyFetchError(err,'原视频播放失败'))}}
function clipDraftKey(videoId){return clipDraftStoragePrefix+encodeURIComponent(videoId)}
function loadClipDraft(videoId,total){const fallback={start:0,end:Math.max(1,total)};try{const raw=localStorage.getItem(clipDraftKey(videoId));if(!raw)return fallback;const d=JSON.parse(raw),start=Number(d.start),end=Number(d.end),minGap=1;if(!Number.isFinite(start)||!Number.isFinite(end))return fallback;if(start<0||end>total+.001||end-start<minGap)return fallback;return{start:Math.max(0,Math.min(start,total-minGap)),end:Math.max(start+minGap,Math.min(end,total))}}catch{return fallback}}
function saveClipDraft(){if(!clipState)return;try{localStorage.setItem(clipDraftKey(clipState.video.id),JSON.stringify({start:clipState.start,end:clipState.end,updatedAt:new Date().toISOString()}))}catch{}}
function clearClipDraft(){if(!clipState)return;try{localStorage.removeItem(clipDraftKey(clipState.video.id))}catch{}}
function setTimelineLoading(){const track=document.getElementById('clipFrameTrack'),count=10;track.className='clip-track';track.innerHTML='';for(let i=0;i<count;i++){const frame=document.createElement('div');frame.className='clip-frame pending';frame.dataset.index=String(i);track.appendChild(frame)}}
function getTimelineOrder(count){const order=[];for(let left=0,right=count-1;left<=right;left++,right--){order.push(left);if(right!==left)order.push(right)}return order}
async function loadClipTimeline(){if(!clipState)return;const seq=++clipTimelineSeq,count=10,order=getTimelineOrder(count);for(const index of order){if(!clipState||seq!==clipTimelineSeq)return;try{const r=await fetch('/api/videos/'+encodeURIComponent(clipState.video.id)+'/clip/timeline',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({frameCount:count,frameIndex:index})});const data=await r.json().catch(()=>({}));if(!clipState||seq!==clipTimelineSeq)return;if(!r.ok||data.success===false||!Array.isArray(data.frames)||data.frames.length===0)throw new Error(data.error||'时间轴预览生成失败');renderTimelineFrame(data.frames[0])}catch(err){markTimelineFrameFailed(index)}}}
function renderTimelineFrame(f){const frame=document.querySelector('.clip-frame[data-index="'+f.index+'"]');if(!frame)return;const img=new Image();img.alt='时间轴 '+formatDuration(f.seconds);img.onload=()=>{frame.className='clip-frame';frame.innerHTML='';frame.title=formatDuration(f.seconds);frame.appendChild(img)};img.src=f.url}
function markTimelineFrameFailed(index){const frame=document.querySelector('.clip-frame[data-index="'+index+'"]');if(!frame)return;frame.className='clip-frame pending';frame.textContent='失败'}
function showClipError(msg){const el=document.getElementById('clipError');el.textContent=msg;el.classList.add('active')}
async function submitClip(){if(!clipState||clipState.busy)return;if(clipState.downloadUrl){downloadClipResult();return}const state=clipState,generationId=++state.generationId;pauseClipSource();state.busy=true;state.cancelRequested=false;document.getElementById('clipDialogWrap').classList.add('busy');text('clipBusyText','监控端正在生成剪辑，请稍候……');document.getElementById('clipDownloadStatus').textContent='';try{const r=await fetch('/api/videos/'+encodeURIComponent(state.video.id)+'/clip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({startSeconds:state.start,endSeconds:state.end})});const data=await r.json().catch(()=>({}));if(!r.ok||data.success===false)throw new Error(data.error||'剪辑启动失败');if(clipState!==state||generationId!==state.generationId){if(data.taskId)fetch('/api/clip-tasks/'+encodeURIComponent(data.taskId)+'/cancel',{method:'POST'}).catch(()=>{});return}state.taskId=data.taskId;pollClipTask()}catch(err){if(clipState!==state||generationId!==state.generationId)return;state.busy=false;state.taskId=null;document.getElementById('clipDialogWrap').classList.remove('busy');showClipError(friendlyFetchError(err,'剪辑启动失败'))}}
async function pollClipTask(){if(!clipState||!clipState.taskId)return;try{const r=await fetch('/api/clip-tasks/'+encodeURIComponent(clipState.taskId));const data=await r.json().catch(()=>({}));if(data.status==='completed'&&data.downloadUrl){showCompletedClip(data);return}if(data.status==='failed'){clipState.busy=false;clipState.taskId=null;document.getElementById('clipDialogWrap').classList.remove('busy');showClipError(data.message||'剪辑失败');return}if(data.status==='canceled'){clipState.busy=false;clipState.taskId=null;document.getElementById('clipDialogWrap').classList.remove('busy');document.getElementById('clipDownloadStatus').textContent='生成已取消，可继续调整';return}text('clipBusyText',data.message||'监控端正在生成剪辑，请稍候……');clipPollTimer=setTimeout(pollClipTask,1000)}catch(err){clipPollTimer=setTimeout(pollClipTask,1500)}}
function showCompletedClip(data){if(!clipState)return;clipState.busy=false;clipState.taskId=null;clipState.downloadUrl=data.downloadUrl;document.getElementById('clipDialogWrap').classList.remove('busy');document.getElementById('clipError').classList.remove('active');document.getElementById('clipDownloadStatus').textContent='剪辑已生成，已开始下载';text('clipSubmitText','重新下载');clearClipDraft();downloadClipResult()}
function downloadClipResult(){if(!clipState||!clipState.downloadUrl)return;const link=document.createElement('a');link.href=clipState.downloadUrl;link.download='';link.style.display='none';document.body.appendChild(link);link.click();link.remove();document.getElementById('clipDownloadStatus').textContent='如果没有自动下载，请点击“重新下载”'}
async function cancelClipTask(){if(!clipState||!clipState.busy)return;if(!confirm('确定要取消本次剪辑吗？'))return;const state=clipState;state.cancelRequested=true;state.generationId++;if(state.taskId){try{await fetch('/api/clip-tasks/'+encodeURIComponent(state.taskId)+'/cancel',{method:'POST'})}catch{}}if(clipState!==state)return;state.busy=false;state.taskId=null;document.getElementById('clipDialogWrap').classList.remove('busy');document.getElementById('clipDownloadStatus').textContent='已取消生成，可继续调整'}
function unloadClipPlayer(id){const player=document.getElementById(id);player.pause();player.removeAttribute('src');player.load()}
function closeClipDialog(force){if(clipState&&clipState.busy&&!force){cancelClipTask();return}if(clipState&&clipState.dragFrameId)cancelAnimationFrame(clipState.dragFrameId);clipTimelineSeq++;clearTimeout(clipPollTimer);clipState=null;unloadClipPlayer('clipSourcePlayer');document.getElementById('clipOverlay').classList.remove('active');document.getElementById('clipDialogWrap').classList.remove('busy')}
function closePlayer(e){if(e&&e.target!==document.getElementById('playerOverlay'))return;const player=document.getElementById('videoPlayer');player.pause();player.src='';clearPlayerMessage();document.getElementById('playerOverlay').classList.remove('active')}function downloadVideo(id){window.open('/api/videos/'+encodeURIComponent(id)+'/download','_blank')}document.addEventListener('keydown',e=>{if(e.key==='Escape'){const overlay=document.getElementById('transcodeConfirmOverlay');if(overlay&&overlay.classList.contains('active'))return;closePlayer()}})
</script>
