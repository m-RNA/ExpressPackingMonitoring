<!DOCTYPE html>
<html lang="zh-CN">

<style>
  :root{--bg:#f4f6f8;--panel:#fff;--panel2:#f8fafc;--text:#172033;--muted:#667085;--border:#dde3ea;--strong:#c8d2df;--primary:#2563eb;--primary2:#1d4ed8;--soft:#e8f0ff;--ok:#138a52;--warn:#b7791f;--bad:#c24135;--shadow:0 10px 26px rgba(27,39,63,.08)}
  *{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei UI","Microsoft YaHei",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input{font:inherit}button{cursor:pointer}.page{max-width:1240px;margin:0 auto;padding:24px 28px 36px}.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:18px}.title-block{flex:1 1 auto;min-width:0}.title-block h1{margin:0;font-size:26px;line-height:1.2;font-weight:750}.title-block p{margin:8px 0 0;color:var(--muted);font-size:13px}.top-actions{display:flex;align-items:center;justify-content:flex-end;gap:12px;flex:0 0 356px;margin-left:auto}.compat-toggle{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;min-width:0;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.82);box-shadow:0 8px 22px rgba(27,39,63,.06);cursor:pointer}.compat-copy{display:flex;flex-direction:column;gap:3px;min-width:0}.compat-title{font-size:13px;font-weight:760;color:var(--text)}.compat-desc{font-size:12px;line-height:1.35;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.switch{position:relative;display:inline-flex;width:46px;height:26px;flex:0 0 auto}.switch input{opacity:0;width:0;height:0}.slider{position:absolute;inset:0;border-radius:999px;background:#cbd5e1;transition:.18s}.slider:before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(15,23,42,.24);transition:.18s}.switch input:checked+.slider{background:var(--primary)}.switch input:checked+.slider:before{transform:translateX(20px)}
  .overview{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:16px}.summary-card{min-height:132px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:space-between}.summary-head{display:flex;align-items:center;gap:9px;color:var(--muted);font-size:13px;font-weight:650}.summary-icon{width:28px;height:28px;display:inline-grid;place-items:center;border-radius:6px;background:var(--soft);color:var(--primary);flex:0 0 auto}.summary-main{margin:12px 0 6px;font-size:26px;font-weight:760;line-height:1.18;color:var(--text)}.summary-note{min-height:18px;color:var(--muted);font-size:12px;line-height:1.45}.progress{width:100%;height:8px;border-radius:999px;background:#e7ecf2;overflow:hidden;margin-top:11px}.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,#2563eb,#22a6f2);border-radius:inherit}
  .toolbar{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;box-shadow:var(--shadow);margin-bottom:14px}.toolbar form{display:grid;grid-template-columns:152px 152px minmax(260px,1fr) auto;gap:12px;align-items:end}.field{display:flex;flex-direction:column;gap:6px;min-width:0}.field label{font-size:12px;color:var(--muted);font-weight:650}.field input{height:38px;border:1px solid var(--strong);border-radius:6px;padding:0 11px;color:var(--text);background:#fff;outline:none}.field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}.btn{height:38px;border:1px solid var(--strong);border-radius:6px;padding:0 14px;background:#fff;color:var(--text);display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:650;white-space:nowrap}.btn:hover{background:var(--panel2)}.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff;min-width:102px}.btn-primary:hover{background:var(--primary2)}.btn[disabled]{opacity:.45;cursor:not-allowed}.icon{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}
  .list-panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}.list-header{height:48px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--border)}.list-title{font-size:15px;font-weight:750}.results-info{color:var(--muted);font-size:12px}.video-list{display:flex;flex-direction:column}.video-item{display:grid;grid-template-columns:minmax(180px,1.25fr) minmax(320px,2.2fr) auto;gap:16px;align-items:center;padding:14px 16px;border-bottom:1px solid #edf1f5}.video-item:hover{background:#fbfdff}.video-item:last-child{border-bottom:none}.order-line{display:flex;align-items:center;gap:9px;min-width:0}.order-id{font-size:16px;font-weight:760;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.mode-badge,.status-badge,.codec-badge{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap}.mode-badge{background:#eef6ff;color:#1d5fae}.mode-badge.return{background:#fff4e5;color:#9a5b10}.status-badge{margin-top:8px;background:#eaf7ef;color:var(--ok);width:fit-content}.status-badge.missing{background:#fff0ed;color:var(--bad)}.meta-grid{display:grid;grid-template-columns:150px 82px 86px minmax(120px,1fr);gap:8px 16px;align-items:center;color:var(--muted);font-size:12px;min-width:0}.meta-cell{min-width:0;display:flex;align-items:center;gap:6px}.meta-cell .text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.codec-badge{max-width:100%;overflow:hidden;text-overflow:ellipsis;background:#fff7db;color:var(--warn);border-radius:5px}.video-actions{display:flex;justify-content:flex-end;gap:8px}.btn-sm{height:32px;padding:0 11px;font-size:12px}.btn-play{color:var(--primary);border-color:#aac4ff;background:#f8fbff}.btn-play:hover{background:var(--soft)}
  .pagination{display:flex;justify-content:center;align-items:center;gap:6px;padding:14px 16px;border-top:1px solid var(--border);min-height:60px}.page-btn{min-width:34px;padding:0 10px}.page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}.empty{padding:58px 18px;text-align:center;color:var(--muted)}.empty-title{font-size:16px;font-weight:750;color:var(--text);margin-bottom:6px}.empty-sub{font-size:13px}.player-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(15,23,42,.72);align-items:center;justify-content:center;padding:28px}.player-overlay.active{display:flex}.player-box{width:min(1080px,96vw);background:#0b1020;border-radius:8px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.45)}.player-top{height:46px;padding:0 14px 0 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;color:#fff;background:#111827}.player-title{font-size:14px;font-weight:650;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.player-close{width:32px;height:32px;border-radius:6px;border:1px solid rgba(255,255,255,.18);background:transparent;color:#fff;font-size:22px;line-height:1}.player-close:hover{background:rgba(255,255,255,.12)}.player-message{display:none;padding:10px 14px;border-top:1px solid rgba(255,255,255,.08);background:#3b2410;color:#ffe8bd;font-size:13px;line-height:1.45}.player-message.active{display:block}.player-box video{display:block;width:100%;max-height:calc(90vh - 46px);background:#000}
  .transcode-confirm-overlay{display:none;position:fixed;inset:0;z-index:140;background:rgba(15,23,42,.54);align-items:center;justify-content:center;padding:24px}.transcode-confirm-overlay.active{display:flex}.transcode-confirm{width:min(440px,94vw);background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:0 24px 70px rgba(15,23,42,.28);padding:20px}.transcode-confirm h2{margin:0 0 10px;font-size:18px;line-height:1.35;color:var(--text)}.transcode-confirm p{margin:0 0 14px;color:var(--muted);font-size:13px;line-height:1.6}.transcode-confirm .warn{color:var(--warn);font-weight:700}.transcode-choice{display:flex;align-items:center;gap:8px;margin:2px 0 18px;color:var(--text);font-size:13px}.transcode-choice input{width:16px;height:16px}.transcode-actions{display:flex;justify-content:flex-end;gap:10px}.transcode-actions .btn{min-width:88px}
  @media (max-width:820px){.page{padding:18px 14px 28px}.topbar{align-items:flex-start;flex-direction:column}.top-actions{width:100%;flex-basis:auto;margin-left:0;justify-content:flex-start}.compat-toggle{width:100%;min-width:0;max-width:none}.compat-desc{white-space:normal}.overview{grid-template-columns:1fr}.toolbar form{grid-template-columns:1fr}.video-item{grid-template-columns:1fr;gap:10px}.meta-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.video-actions{justify-content:flex-start;flex-wrap:wrap}}
</style>

<body>
<div class="page">
  <header class="topbar"><div class="title-block"><h1>快递打包录像回放</h1><p>按日期或订单号检索局域网监控端录像，支持在线播放、转码预览和文件下载。</p></div><div class="top-actions"><label class="compat-toggle" for="compatModeToggle"><span class="compat-copy"><span class="compat-title">播放兼容模式</span><span class="compat-desc" id="compatModeText">开启后可兼容更多手机和浏览器</span></span><span class="switch"><input type="checkbox" id="compatModeToggle" checked><span class="slider"></span></span></label></div></header>
  <section class="overview" aria-label="录像保留情况">
    <article class="summary-card"><div><div class="summary-head"><span class="summary-icon" data-icon="calendar"></span><span>当前可追溯到</span></div><div class="summary-main" id="oldestValue">加载中</div></div><div class="summary-note" id="oldestNote">正在读取录像存储情况</div></article>
    <article class="summary-card"><div><div class="summary-head"><span class="summary-icon" data-icon="clock"></span><span>预计可保留</span></div><div class="summary-main" id="retentionValue">加载中</div></div><div class="summary-note" id="retentionNote">估算值仅供参考</div></article>
    <article class="summary-card"><div><div class="summary-head"><span class="summary-icon" data-icon="database"></span><span>存储空间</span></div><div class="summary-main" id="storageValue">加载中</div></div><div class="summary-note" id="storageNote">正在读取配置目录</div><div class="progress"><span id="storageProgress"></span></div></article>
  </section>
  <section class="toolbar" aria-label="搜索条件"><form onsubmit="doSearch(); return false;"><div class="field"><label for="startDate">开始日期</label><input type="date" id="startDate"></div><div class="field"><label for="endDate">结束日期</label><input type="date" id="endDate"></div><div class="field"><label for="keyword">订单号或文件名</label><input type="text" id="keyword" placeholder="输入订单号关键词搜索"></div><button type="submit" class="btn btn-primary"><span data-icon="search"></span><span>搜索</span></button></form></section>
  <section class="list-panel" aria-label="录像列表"><div class="list-header"><div class="list-title">录像列表</div><div class="results-info" id="resultsInfo"></div></div><div class="video-list" id="videoList"></div><div class="pagination" id="pagination"></div></section>
</div>
<div class="player-overlay" id="playerOverlay" onclick="closePlayer(event)"><div class="player-box" onclick="event.stopPropagation()"><div class="player-top"><div class="player-title" id="playerTitle"></div><button class="player-close" type="button" aria-label="关闭播放器" onclick="closePlayer()">×</button></div><div class="player-message" id="playerMessage"></div><video id="videoPlayer" controls></video></div></div>
<div class="transcode-confirm-overlay" id="transcodeConfirmOverlay" role="dialog" aria-modal="true" aria-labelledby="transcodeConfirmTitle"><div class="transcode-confirm" onclick="event.stopPropagation()"><h2 id="transcodeConfirmTitle">录制中转码确认</h2><p id="transcodeConfirmMessage"><span class="warn">正在录制。</span>转码可能影响实时预览和录制稳定性，是否继续？</p><label class="transcode-choice"><input type="checkbox" id="transcodeSkipConfirm"><span>不再提示，录制中也允许继续转码</span></label><div class="transcode-actions"><button type="button" class="btn" id="transcodeCancelBtn">取消</button><button type="button" class="btn btn-primary" id="transcodeContinueBtn">继续转码</button></div></div></div>
<script>
let currentPage=1,lastResult=null,playbackCompatMode=true,searchTimer=null,searchSeq=0,searchAbort=null;const pageSize=20,compatStorageKey='expressPlaybackCompatMode',transcodeConfirmStorageKey='expressPlaybackTranscodeConfirmSkipped';const icons={calendar:'<svg class="icon" viewBox="0 0 24 24"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/></svg>',clock:'<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',database:'<svg class="icon" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg>',search:'<svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',play:'<svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7Z"/></svg>',download:'<svg class="icon" viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>',file:'<svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>',time:'<svg class="icon" viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="9"/></svg>',size:'<svg class="icon" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>'};
(function init(){mountIcons(document);initCompatMode();initSearchAutoRefresh();loadStorageOverview();doSearch();})();
function mountIcons(root){root.querySelectorAll('[data-icon]').forEach(el=>{el.innerHTML=icons[el.dataset.icon]||''})}function initCompatMode(){const saved=localStorage.getItem(compatStorageKey);playbackCompatMode=saved===null?true:saved!=='0';const toggle=document.getElementById('compatModeToggle'),player=document.getElementById('videoPlayer');if(toggle){toggle.checked=playbackCompatMode;toggle.addEventListener('change',()=>{playbackCompatMode=toggle.checked;localStorage.setItem(compatStorageKey,playbackCompatMode?'1':'0');updateCompatModeText();if(lastResult)render(lastResult)})}if(player){player.addEventListener('error',()=>{if(!playbackCompatMode)showPlayerMessage('当前设备可能不支持直接播放该视频编码，请开启“播放兼容模式”后重试。')})}updateCompatModeText()}function updateCompatModeText(){text('compatModeText',playbackCompatMode?'开启：非 H.264 视频自动转码为 H.264':'若无法正常播放，请打开兼容模式。')}function showPlayerMessage(msg){const el=document.getElementById('playerMessage');el.textContent=msg;el.classList.add('active')}function clearPlayerMessage(){const el=document.getElementById('playerMessage');el.textContent='';el.classList.remove('active')}function fmt(d){return d.toISOString().slice(0,10)}function text(id,v){document.getElementById(id).textContent=v}function formatDateOnly(v){return v?String(v).slice(0,10):''}function formatGB(v){v=Number(v||0);return v.toLocaleString('zh-CN',{maximumFractionDigits:v>=10?0:1})+'GB'}function formatDuration(sec){const s=Math.max(0,Number(sec||0)),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),r=Math.floor(s%60);return h>0?h+':'+String(m).padStart(2,'0')+':'+String(r).padStart(2,'0'):String(m).padStart(2,'0')+':'+String(r).padStart(2,'0')}
function loadStorageOverview(){fetch('/api/storage').then(r=>{if(!r.ok)throw new Error();return r.json()}).then(renderStorageOverview).catch(()=>{text('oldestValue','暂不可用');text('oldestNote','存储信息接口请求失败，不影响录像搜索');text('retentionValue','暂无法估算');text('retentionNote','历史数据或存储配置暂不可用');text('storageValue','暂不可用');text('storageNote','存储信息暂不可用');document.getElementById('storageProgress').style.width='0%'})}
function renderStorageOverview(d){if(!d||!d.oldestVideoTime){text('oldestValue','暂无录像数据');text('oldestNote','当前存储库未找到可用录像')}else{text('oldestValue',formatDateOnly(d.oldestVideoTime));text('oldestNote','已保存约 '+(d.savedDays||1)+' 天录像'+(d.latestVideoTime?'，最新 '+d.latestVideoTime:''))}if(d&&d.estimatedRetentionDays){text('retentionValue','约 '+d.estimatedRetentionDays+' 天');text('retentionNote',(d.estimateBasis||'基于当前录像占用估算')+(d.avgGBPerDay?'，平均约 '+d.avgGBPerDay+'GB / 天':''))}else{text('retentionValue','暂无法估算');text('retentionNote','历史数据不足或平均每日占用为 0')}const used=Number(d&&d.usedGB||0),total=Number(d&&d.totalGB||0),free=Number(d&&d.freeGB||0),pct=total>0?Math.max(0,Math.min(100,used/total*100)):0;text('storageValue','已用 '+formatGB(used)+' / '+formatGB(total));text('storageNote',(d&&d.pathCount>1?'共 '+d.pathCount+' 个存储目录，':'')+'剩余 '+formatGB(free));document.getElementById('storageProgress').style.width=pct.toFixed(1)+'%'}
function initSearchAutoRefresh(){const keyword=document.getElementById('keyword'),start=document.getElementById('startDate'),end=document.getElementById('endDate');if(keyword)keyword.addEventListener('input',()=>scheduleSearch());if(start)start.addEventListener('change',()=>scheduleSearch(0));if(end)end.addEventListener('change',()=>scheduleSearch(0))}function scheduleSearch(delay=250){clearTimeout(searchTimer);searchTimer=setTimeout(()=>doSearch(1),delay)}
function doSearch(page){clearTimeout(searchTimer);currentPage=page||1;const params=new URLSearchParams({start:document.getElementById('startDate').value,end:document.getElementById('endDate').value,keyword:document.getElementById('keyword').value.trim(),page:currentPage,size:pageSize});const seq=++searchSeq;if(searchAbort)searchAbort.abort();searchAbort=window.AbortController?new AbortController():null;text('resultsInfo','正在搜索...');fetch('/api/videos?'+params,searchAbort?{signal:searchAbort.signal}:undefined).then(r=>r.json()).then(res=>{if(seq===searchSeq)render(res)}).catch(err=>{if(err&&err.name==='AbortError')return;if(seq!==searchSeq)return;text('resultsInfo','连接失败');renderEmpty('无法连接监控端','请确认监控端软件已打开，并通过监控端显示的局域网地址访问；如果仍失败，请检查两台电脑是否在同一网络，以及防火墙是否放行 Web 服务端口。')})}
function render(res){lastResult=res;const list=document.getElementById('videoList'),pagi=document.getElementById('pagination');list.innerHTML='';pagi.innerHTML='';if(!res.data||res.data.length===0){text('resultsInfo','没有找到匹配记录');renderEmpty('没有找到匹配的录像','请调整日期范围或订单号关键词');return}const totalPages=Math.max(1,Math.ceil(res.total/res.pageSize));text('resultsInfo','共 '+res.total+' 条记录，第 '+res.page+' / '+totalPages+' 页');res.data.forEach(v=>list.appendChild(createVideoItem(v)));renderPagination(res.page,totalPages)}
function createVideoItem(v){const item=document.createElement('article');item.className='video-item';const orderCol=document.createElement('div'),line=document.createElement('div');line.className='order-line';const badge=document.createElement('span');badge.className='mode-badge'+(v.mode==='退货'?' return':'');badge.textContent=v.mode||'发货';const order=document.createElement('div');order.className='order-id';order.title=v.orderId||'';order.textContent=v.orderId||'未记录订单号';line.append(badge,order);const status=document.createElement('div');status.className='status-badge'+(v.exists?'':' missing');status.textContent=v.exists?'文件可用':'文件不存在';orderCol.append(line,status);const meta=document.createElement('div');meta.className='meta-grid';addMeta(meta,'calendar',v.startTime||'-');addMeta(meta,'time',v.duration||formatDuration(v.durationSec));addMeta(meta,'size',formatSize(v.sizeMB));addMeta(meta,'file',v.fileName||'-');if(v.videoCodec&&String(v.videoCodec).toLowerCase()!=='h264'){const codecName=String(v.videoCodec).toUpperCase(),hint=playbackCompatMode?codecName+' · 在线播放将自动转码以提高兼容性':codecName+' · 当前尝试直接播放，若无法播放请开启兼容模式';const codec=document.createElement('span');codec.className='codec-badge';codec.title=hint;codec.textContent=hint;meta.appendChild(codec)}const actions=document.createElement('div');actions.className='video-actions';const play=actionButton('play','播放','btn-play',()=>playVideo(v.id,v.orderId||v.fileName||'录像预览')),down=actionButton('download','下载','',()=>downloadVideo(v.id));if(!v.exists){play.disabled=true;down.disabled=true;play.title=down.title='文件不存在'}actions.append(play,down);item.append(orderCol,meta,actions);mountIcons(item);return item}
function addMeta(parent,icon,value){const cell=document.createElement('div');cell.className='meta-cell';const i=document.createElement('span');i.dataset.icon=icon;const s=document.createElement('span');s.className='text';s.title=value;s.textContent=value;cell.append(i,s);parent.appendChild(cell)}function actionButton(icon,label,extra,onClick){const btn=document.createElement('button');btn.type='button';btn.className='btn btn-sm '+extra;btn.innerHTML=(icons[icon]||'')+'<span></span>';btn.querySelector('span:last-child').textContent=label;btn.addEventListener('click',onClick);return btn}function formatSize(sizeMB){const mb=Number(sizeMB||0);return mb>=1024?(mb/1024).toFixed(1)+'GB':mb.toFixed(mb>=10?0:1)+'MB'}
function renderPagination(page,totalPages){const pagi=document.getElementById('pagination');if(totalPages<=1)return;const add=(label,target,active,disabled)=>{const btn=document.createElement('button');btn.type='button';btn.className='btn btn-sm page-btn'+(active?' active':'');btn.textContent=label;btn.disabled=!!disabled;btn.addEventListener('click',()=>doSearch(target));pagi.appendChild(btn)};add('上一页',Math.max(1,page-1),false,page<=1);const start=Math.max(1,Math.min(page-4,totalPages-8)),end=Math.min(totalPages,start+8);for(let i=start;i<=end;i++)add(String(i),i,i===page,false);add('下一页',Math.min(totalPages,page+1),false,page>=totalPages)}
function renderEmpty(title,sub){const list=document.getElementById('videoList');list.innerHTML='';const box=document.createElement('div');box.className='empty';const t=document.createElement('div');t.className='empty-title';t.textContent=title;const s=document.createElement('div');s.className='empty-sub';s.textContent=sub;box.append(t,s);list.appendChild(box);document.getElementById('pagination').innerHTML=''}
async function playVideo(id,title){const player=document.getElementById('videoPlayer'),compat=playbackCompatMode?'1':'0';clearPlayerMessage();document.getElementById('playerTitle').textContent=title;document.getElementById('playerOverlay').classList.add('active');showPlayerMessage('正在准备视频，请稍候...');let url='/api/videos/'+encodeURIComponent(id)+'/play?compat='+compat;if(localStorage.getItem(transcodeConfirmStorageKey)==='1')url+='&allowTranscodeWhileRecording=1';try{let r=await fetch(url+'&preflight=1');let data=await r.json().catch(()=>({}));if(r.status===409&&data.requiresConfirmation){const confirmResult=await showTranscodeConfirm(data.message||'正在录制，转码可能影响实时预览和录制稳定性。是否继续？');if(!confirmResult.ok){showPlayerMessage('已取消转码播放。');return}if(confirmResult.skip)localStorage.setItem(transcodeConfirmStorageKey,'1');url=data.url||url+'&allowTranscodeWhileRecording=1';r=await fetch(url+'&preflight=1');data=await r.json().catch(()=>({}));if(!r.ok)throw new Error(data.error||'视频准备失败')}else if(!r.ok){throw new Error(data.error||'视频准备失败')}player.src=data.url||url;clearPlayerMessage();await player.play()}catch(e){showPlayerMessage(e&&e.message?e.message:'视频准备失败，请稍后重试。')}}
function showTranscodeConfirm(message){const overlay=document.getElementById('transcodeConfirmOverlay'),msg=document.getElementById('transcodeConfirmMessage'),skip=document.getElementById('transcodeSkipConfirm'),cancel=document.getElementById('transcodeCancelBtn'),cont=document.getElementById('transcodeContinueBtn');msg.textContent=message;skip.checked=false;overlay.classList.add('active');return new Promise(resolve=>{const finish=ok=>{overlay.classList.remove('active');overlay.onclick=cancel.onclick=cont.onclick=null;resolve({ok,skip:skip.checked})};overlay.onclick=()=>finish(false);cancel.onclick=()=>finish(false);cont.onclick=()=>finish(true)})}
function closePlayer(e){if(e&&e.target!==document.getElementById('playerOverlay'))return;const player=document.getElementById('videoPlayer');player.pause();player.src='';clearPlayerMessage();document.getElementById('playerOverlay').classList.remove('active')}function downloadVideo(id){window.open('/api/videos/'+encodeURIComponent(id)+'/download','_blank')}document.addEventListener('keydown',e=>{if(e.key==='Escape'){const overlay=document.getElementById('transcodeConfirmOverlay');if(overlay&&overlay.classList.contains('active'))return;closePlayer()}})
</script>
