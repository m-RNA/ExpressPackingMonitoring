{display:block}.clip-actions{display:flex;justify-content:flex-end;gap:10px}.clip-busy{display:none;position:absolute;inset:0;background:rgba(255,255,255,.84);align-items:center;justify-content:center;text-align:center;padding:20px;color:var(--text);font-weight:700}.clip-dialog-wrap{position:relative}.clip-dialog-wrap.busy .clip-busy{display:flex}

<body>
<div class="page">
  <header class="topbar"><div class="title-block"><h1>快递打包录像回放</h1><p>按日期或订单号检索局域网监控端录像，支持在线播放、转码预览和文件下载。</p></div><div class="top-actions"><a class="install-card" href="/kuaidizs-install-guide" target="_blank" rel="noopener"><span class="install-icon" data-icon="printer"></span><span class="install-copy"><span class="install-title">安装订单备注插件</span><span class="install-desc">播报买家留言和卖家备注</span></span></a><label class="compat-toggle" for="compatModeToggle"><span class="compat-copy"><span class="compat-title">播放兼容模式</span><span class="compat-desc" id="compatModeText">开启后可兼容更多手机和浏览器</span></span><span class="switch"><input type="checkbox" id="compatModeToggle" checked><span class="slider"></span></span></label></div></header>
  <section class="overview" aria-label="录像保留情况">
    <article class="summary-card"><div><div class="summary-head"><span class="summary-icon" data-icon="calendar"></span><span>当前可追溯到</span></div><div class="summary-main" id="oldestValue">加载中</div></div><div class="summary-note" id="oldestNote">正在读取录像存储情况</div></article>
    <article class="summary-card"><div><div class="summary-head"><span class="summary-icon" data-icon="clock"></span><span>预计可保留</span></div><div class="summary-main" id="retentionValue">加载中</div></div><div class="summary-note" id="retentionNote">估算值仅供参考</div></article>
    <article class="summary-card"><div><div class="summary-head"><span class="summary-icon" data-icon="database"></span><span>存储空间</span></div><div class="summary-main" id="storageValue">加载中</div></div><div class="summary-note" id="storageNote">正在读取配置目录</div><div class="progress"><span id="storageProgress"></span></div></article>
  </section>
  <section class="toolbar" aria-label="搜索条件"><form onsubmit="doSearch(); return false;"><div class="field"><label for="startDate">开始日期</label><input type="date" id="startDate"></div><div class="field"><label for="endDate">结束日期</label><input type="date" id="endDate"></div><div class="field"><label for="keyword">订单号或文件名</label><input type="text" id="keyword" placeholder="输入订单号关键词搜索"></div></form></section>
  <section class="list-panel" aria-label="录像列表"><div class="list-header"><div class="list-title">录像列表</div><div class="results-info" id="resultsInfo"></div></div><div class="video-list" id="videoList"></div><div class="pagination" id="pagination"></div></section>
</div>
<div class="player-overlay" id="playerOverlay" onclick="closePlayer(event)"><div class="player-box" onclick="event.stopPropagation()"><div class="player-top"><div class="player-title" id="playerTitle"></div><button class="player-close" type="button" aria-label="关闭播放器" onclick="closePlayer()">×</button></div><div class="player-message" id="playerMessage"></div><video id="videoPlayer" controls></video></div></div>
<div class="transcode-confirm-overlay" id="transcodeConfirmOverlay" role="dialog" aria-modal="true" aria-labelledby="transcodeConfirmTitle"><div class="transcode-confirm" onclick="event.stopPropagation()"><h2 id="transcodeConfirmTitle">录制中转码确认</h2><p id="transcodeConfirmMessage"><span class="warn">正在录制。</span>转码可能影响实时预览和录制稳定性，是否继续？</p><label class="transcode-choice"><input type="checkbox" id="transcodeSkipConfirm"><span>不再提示，录制中也允许继续转码</span></label><div class="transcode-actions"><button type="button" class="btn" id="transcodeCancelBtn">取消</button><button type="button" class="btn btn-primary" id="transcodeContinueBtn">继续转码</button></div></div></div>
<div class="clip-overlay" id="clipOverlay" role="dialog" aria-modal="true" aria-labelledby="clipTitle"><div class="clip-dialog-wrap" id="clipDialogWrap"><div class="clip-dialog" onclick="event.stopPropagation()"><div class="clip-head"><h2 id="clipTitle">剪辑</h2><button class="player-close" type="button" aria-label="关闭剪辑" onclick="closeClipDialog()">×</button></div><div class="clip-preview-grid"><div><div class="clip-preview-title">裁剪后第一帧预览</div><div class="clip-preview-box" id="clipStartPreview">预览生成中……</div></div><div><div class="clip-preview-title">裁剪后最后一帧预览</div><div class="clip-preview-box" id="clipEndPreview">预览生成中……</div></div></div><div class="clip-timeline"><div class="clip-track loading" id="clipFrameTrack">时间轴预览生成中……</div><div class="clip-range" id="clipRangeBar"></div><input class="clip-range-input" id="clipStartRange" type="range" min="0" max="1" step="0.1" value="0" aria-label="剪辑开始时间"><input class="clip-range-input" id="clipEndRange" type="range" min="0" max="1" step="0.1" value="1" aria-label="剪辑结束时间"></div><div class="clip-info"><div>保留范围：<span id="clipRangeText">00:00 ~ 00:01</span></div><div>剪辑后时长：<span id="clipDurationText">00:01</span></div></div><div class="clip-error" id="clipError"></div><div class="clip-actions"><button type="button" class="btn" onclick="closeClipDialog()">取消</button><button type="button" class="btn btn-primary" id="clipSubmitBtn" onclick="submitClip()">剪辑并下载</button></div></div><div class="clip-busy"><div><div id="clipBusyText">监控端正在剪辑中，请稍候……</div><div style="margin-top:14px"><button type="button" class="btn" onclick="cancelClipTask()">取消</button></div></div></div></div></div>
<script>
let currentPage=1,lastResult=null,playbackCompatMode=true,searchTimer=null,searchSeq=0,searchAbort=null,clipState=null,clipPreviewTimers={start:null,end:null,both:null},clipPreviewSeq={start:0,end:0,both:0},clipTimelineSeq=0,clipPollTimer=null,clipPrewarmTimer=null;const pageSize=20,compatStorageKey='expressPlaybackCompatMode',transcodeConfirmStorageKey='expressPlaybackTranscodeConfirmSkipped';const icons={calendar:'<svg class="icon" viewBox="0 0 24 24"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/></svg>',clock:'<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',database:'<svg class="icon" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg>',search:'<svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',printer:'<svg class="icon" viewBox="0 0 24 24"><path d="M7 8V4h10v4"/><path d="M7 17H5a2 2 0 0 1-2-2v-4a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3v4a2 2 0 0 1-2 2h-2"/><path d="M7 14h10v6H7z"/><path d="M17 11h.01"/></svg>',link:'<svg class="icon" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1 0l-2 2a5 5 0 0 0 7.1 7.1l1.1-1.1"/></svg>',play:'<svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7Z"/></svg>',download:'<svg class="icon" viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>',scissors:'<svg class="icon" viewBox="0 0 24 24"><circle cx="6" cy="7" r="3"/><circle cx="6" cy="17" r="3"/><path d="M8.6 8.6 19 19M8.6 15.4 19 5"/></svg>',file:'<svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>',time:'<svg class="icon" viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="9"/></svg>',size:'<svg class="icon" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>'};
(function init(){mountIcons(document);initCompatMode();initSearchAutoRefresh();loadStorageOverview();doSearch();})();
function mountIcons(root){root.querySelectorAll('[data-icon]').forEach(el=>{el.innerHTML=icons[el.dataset.icon]||''})}function initCompatMode(){const saved=localStorage.getItem(compatStorageKey);playbackCompatMode=saved===null?true:saved!=='0';const toggle=document.getElementById('compatModeToggle'),player=document.getElementById('videoPlayer');if(toggle){toggle.checked=playbackCompatMode;toggle.addEventListener('change',()=>{playbackCompatMode=toggle.checked;localStorage.setItem(compatStorageKey,playbackCompatMode?'1':'0');updateCompatModeText();if(lastResult)render(lastResult)})}if(player){player.addEventListener('error',()=>{if(!playbackCompatMode)showPlayerMessage('当前设备可能不支持直接播放该视频编码，请开启“播放兼容模式”后重试。')})}updateCompatModeText()}function updateCompatModeText(){text('compatModeText',playbackCompatMode?'非 H.264 视频自动转码为 H.264':'若无法正常播放，请打开兼容模式')}function showPlayerMessage(msg){const el=document.getElementById('playerMessage');el.textContent=msg;el.classList.add('active')}function clearPlayerMessage(){const el=document.getElementById('playerMessage');el.textContent='';el.classList.remove('active')}function friendlyFetchError(err,fallback){const msg=err&&err.message?String(err.message):'';if(err&&err.name==='AbortError')return fallback||'请求已取消';if(!msg||/failed to fetch|networkerror|load failed|network request failed/i.test(msg))return '无法连接监控端。请先确认监控端软件已经打开，并且当前页面使用的是监控端显示的局域网地址。如果还是不行，请检查这台设备和监控端是否在同一网络，或让防火墙放行监控端 Web 服务端口。';return msg||fallback||'操作失败，请稍后重试。'}function fmt(d){return d.toISOString().slice(0,10)}function text(id,v){document.getElementById(id).textContent=v}function formatDateOnly(v){return v?String(v).slice(0,10):''}function formatGB(v){v=Number(v||0);return v.toLocaleString('zh-CN',{maximumFractionDigits:v>=10?0:1})+'GB'}function formatDuration(sec){const s=Math.max(0,Number(sec||0)),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),r=Math.floor(s%60);return h>0?h+':'+String(m).padStart(2,'0')+':'+String(r).padStart(2,'0'):String(m).padStart(2,'0')+':'+String(r).padStart(2,'0')}
function loadStorageOverview(){fetch('/api/storage').then(r=>{if(!r.ok)throw new Error();return r.json()}).then(renderStorageOverview).catch(()=>{text('oldestValue','暂不可用');text('oldestNote','存储信息接口请求失败，不影响录像搜索');text('retentionValue','暂无法估算');text('retentionNote','历史数据或存储配置暂不可用');text('storageValue','暂不可用');text('storageNote','存储信息暂不可用');document.getElementById('storageProgress').style.width='0%'})}
function renderStorageOverview(d){if(!d||!d.oldestVideoTime){text('oldestValue','暂无录像数据');text('oldestNote','当前存储库未找到可用录像')}else{text('oldestValue',formatDateOnly(d.oldestVideoTime));text('oldestNote','已保存约 '+(d.savedDays||1)+' 天录像'+(d.latestVideoTime?'，最新 '+d.latestVideoTime:''))}if(d&&d.estimatedRetentionDays){text('retentionValue','约 '+d.estimatedRetentionDays+' 天');text('retentionNote',(d.estimateBasis||'基于当前录像占用估算')+(d.avgGBPerDay?'，平均约 '+d.avgGBPerDay+'GB / 天':''))}else{text('retentionValue','暂无法估算');text('retentionNote','历史数据不足或平均每日占用为 0')}const used=Number(d&&d.usedGB||0),total=Number(d&&d.totalGB||0),free=Number(d&&d.freeGB||0),pct=total>0?Math.max(0,Math.min(100,used/total*100)):0;text('storageValue','已用 '+formatGB(used)+' / '+formatGB(total));text('storageNote',(d&&d.pathCount>1?'共 '+d.pathCount+' 个存储目录，':'')+'剩余 '+formatGB(free));document.getElementById('storageProgress').style.width=pct.toFixed(1)+'%'}
function initSearchAutoRefresh(){const keyword=document.getElementById('keyword'),start=document.getElementById('startDate'),end=document.getElementById('endDate');if(keyword)keyword.addEventListener('input',()=>scheduleSearch());if(start)start.addEventListener('change',()=>scheduleSearch(0));if(end)end.addEventListener('change',()=>scheduleSearch(0))}function scheduleSearch(delay=250){clearTimeout(searchTimer);searchTimer=setTimeout(()=>doSearch(1),delay)}
function doSearch(page){clearTimeout(searchTimer);currentPage=page||1;const params=new URLSearchParams({start:document.getElementById('startDate').value,end:document.getElementById('endDate').value,keyword:document.getElementById('keyword').value.trim(),page:currentPage,size:pageSize});const seq=++searchSeq;if(searchAbort)searchAbort.abort();searchAbort=window.AbortController?new AbortController():null;text('resultsInfo','正在搜索...');fetch('/api/videos?'+params,searchAbort?{signal:searchAbort.signal}:undefined).then(r=>r.json()).then(res=>{if(seq===searchSeq)render(res)}).catch(err=>{if(err&&err.name==='AbortError')return;if(seq!==searchSeq)return;text('resultsInfo','连接失败');renderEmpty('无法连接监控端',friendlyFetchError(err))})}
function render(res){lastResult=res;const list=document.getElementById('videoList'),pagi=document.getElementById('pagination');list.innerHTML='';pagi.innerHTML='';if(!res.data||res.data.length===0){text('resultsInfo','没有找到匹配记录');renderEmpty('没有找到匹配的录像','请调整日期范围或订单号关键词');return}const totalPages=Math.max(1,Math.ceil(res.total/res.pageSize));text('resultsInfo','共 '+res.total+' 条记录，第 '+res.page+' / '+totalPages+' 页');res.data.forEach(v=>list.appendChild(createVideoItem(v)));renderPagination(res.page,totalPages)}
function createVideoItem(v){const item=document.createElement('article');item.className='video-item';const orderCol=document.createElement('div'),line=document.createElement('div');line.className='order-line';const badge=document.createElement('span');badge.className='mode-badge'+(v.mode==='退货'?' return':'');badge.textContent=v.mode||'发货';const order=document.createElement('div');order.className='order-id';order.title=v.orderId||'';order.textContent=v.orderId||'未记录订单号';line.append(badge,order);const status=document.createElement('div');status.className='status-badge'+(v.exists?'':' missing');status.textContent=v.exists?'文件可用':'文件不存在';orderCol.append(line,status);const meta=document.createElement('div');meta.className='meta-grid';addMeta(meta,'calendar',v.startTime||'-');addMeta(meta,'time',v.duration||formatDuration(v.durationSec));addMeta(meta,'size',formatSize(v.sizeMB));addMeta(meta,'file',v.fileName||'-');if(v.videoCodec&&String(v.videoCodec).toLowerCase()!=='h264'){const codecName=String(v.videoCodec).toUpperCase(),hint=playbackCompatMode?codecName+' · 在线播放将自动转码以提高兼容性':codecName+' · 当前尝试直接播放，若无法播放请开启兼容模式';const codec=document.createElement('span');codec.className='codec-badge';codec.title=hint;codec.textContent=hint;meta.appendChild(codec)}const actions=document.createElement('div');actions.className='video-actions';const play=actionButton('play','播放','btn-play',()=>playVideo(v.id,v.orderId||v.fileName||'录像预览')),clip=actionButton('scissors','剪辑','',()=>openClipDialog(v)),down=actionButton('download','下载','',()=>downloadVideo(v.id));if(!v.exists){play.disabled=true;clip.disabled=true;down.disabled=true;play.title=clip.title=down.title='文件不存在'}actions.append(play,clip,down);item.append(orderCol,meta,actions);mountIcons(item);return item}
function addMeta(parent,icon,value){const cell=document.createElement('div');cell.className='meta-cell';const i=document.createElement('span');i.dataset.icon=icon;const s=document.createElement('span');s.className='text';s.title=value;s.textContent=value;cell.append(i,s);parent.appendChild(cell)}function actionButton(icon,label,extra,onClick){const btn=document.createElement('button');btn.type='button';btn.className='btn btn-sm '+extra;btn.innerHTML=(icons[icon]||'')+'<span></span>';btn.querySelector('span:last-child').textContent=label;btn.addEventListener('click',onClick);return btn}function formatSize(sizeMB){const mb=Number(sizeMB||0);return mb>=1024?(mb/1024).toFixed(1)+'GB':mb.toFixed(mb>=10?0:1)+'MB'}
function renderPagination(page,totalPages){const pagi=document.getElementById('pagination');if(totalPages<=1)return;const add=(label,target,active,disabled)=>{const btn=document.createElement('button');btn.type='button';btn.className='btn btn-sm page-btn'+(active?' active':'');btn.textContent=label;btn.disabled=!!disabled;btn.addEventListener('click',()=>doSearch(target));pagi.appendChild(btn)};add('上一页',Math.max(1,page-1),false,page<=1);const start=Math.max(1,Math.min(page-4,totalPages-8)),end=Math.min(totalPages,start+8);for(let i=start;i<=end;i++)add(String(i),i,i===page,false);add('下一页',Math.min(totalPages,page+1),false,page>=totalPages)}
function renderEmpty(title,sub){const list=document.getElementById('videoList');list.innerHTML='';const box=document.createElement('div');box.className='empty';const t=document.createElement('div');t.className='empty-title';t.textContent=title;const s=document.createElement('div');s.className='empty-sub';s.textContent=sub;box.append(t,s);list.appendChild(box);document.getElementById('pagination').innerHTML=''}
async function playVideo(id,title){const player=document.getElementById('videoPlayer'),compat=playbackCompatMode?'1':'0';clearPlayerMessage();document.getElementById('playerTitle').textContent=title;document.getElementById('playerOverlay').classList.add('active');showPlayerMessage('正在准备视频，请稍候...');let url='/api/videos/'+encodeURIComponent(id)+'/play?compat='+compat;if(localStorage.getItem(transcodeConfirmStorageKey)==='1')url+='&allowTranscodeWhileRecording=1';try{let r=await fetch(url+'&preflight=1');let data=await r.json().catch(()=>({}));if(r.status===409&&data.requiresConfirmation){const confirmResult=await showTranscodeConfirm(data.message||'正在录制，转码可能影响实时预览和录制稳定性。是否继续？');if(!confirmResult.ok){showPlayerMessage('已取消转码播放。');return}if(confirmResult.skip)localStorage.setItem(transcodeConfirmStorageKey,'1');url=data.url||url+'&allowTranscodeWhileRecording=1';r=await fetch(url+'&preflight=1');data=await r.json().catch(()=>({}));if(!r.ok)throw new Error(data.message||data.error||'视频准备失败')}else if(!r.ok){throw new Error(data.message||data.error||'视频准备失败')}player.src=data.url||url;clearPlayerMessage();await player.play()}catch(e){showPlayerMessage(friendlyFetchError(e,'视频准备失败，请稍后重试。'))}}
function showTranscodeConfirm(message){const overlay=document.getElementById('transcodeConfirmOverlay'),msg=document.getElementById('transcodeConfirmMessage'),skip=document.getElementById('transcodeSkipConfirm'),cancel=document.getElementById('transcodeCancelBtn'),cont=document.getElementById('transcodeContinueBtn');msg.textContent=message;skip.checked=false;overlay.classList.add('active');return new Promise(resolve=>{const finish=ok=>{overlay.classList.remove('active');overlay.onclick=cancel.onclick=cont.onclick=null;resolve({ok,skip:skip.checked})};overlay.onclick=()=>finish(false);cancel.onclick=()=>finish(false);cont.onclick=()=>finish(true)})}
function openClipDialog(v){const total=Math.max(1,Number(v.durationSec||1));clipState={video:v,total,start:0,end:Math.max(1,total),taskId:null,busy:false};const s=document.getElementById('clipStartRange'),e=document.getElementById('clipEndRange');s.max=e.max=String(total);s.value='0';e.value=String(total);s.oninput=()=>onClipRangeInput('start');e.oninput=()=>onClipRangeInput('end');document.getElementById('clipError').classList.remove('active');document.getElementById('clipDialogWrap').classList.remove('busy');document.getElementById('clipOverlay').classList.add('active');updateClipUi();setPreviewBox('clipStartPreview','预览生成中……');setPreviewBox('clipEndPreview','预览生成中……');setTimelineLoading();loadClipTimeline();prewarmClipPreviews();scheduleClipPreview('both',0)}
function onClipRangeInput(which){if(!clipState)return;const s=document.getElementById('clipStartRange'),e=document.getElementById('clipEndRange'),minGap=1,total=clipState.total;let start=Number(s.value),end=Number(e.value);if(which==='start'&&start>end-minGap)start=Math.max(0,end-minGap);if(which==='end'&&end<start+minGap)end=Math.min(total,start+minGap);clipState.start=Math.max(0,Math.min(start,total-minGap));clipState.end=Math.max(clipState.start+minGap,Math.min(end,total));s.value=String(clipState.start);e.value=String(clipState.end);updateClipUi();scheduleClipPreview(which,250);scheduleClipPrewarm(which,350)}
function updateClipUi(){if(!clipState)return;const pctStart=clipState.total>0?clipState.start/clipState.total*100:0,pctEnd=clipState.total>0?clipState.end/clipState.total*100:100,bar=document.getElementById('clipRangeBar');bar.style.left=pctStart+'%';bar.style.width=Math.max(0,pctEnd-pctStart)+'%';text('clipRangeText',formatDuration(clipState.start)+' ~ '+formatDuration(clipState.end));text('clipDurationText',formatDuration(clipState.end-clipState.start))}
function setPreviewBox(id,html){document.getElementById(id).innerHTML=html}
function scheduleClipPreview(side,delay){side=side||'both';clearTimeout(clipPreviewTimers[side]);clipPreviewTimers[side]=setTimeout(()=>loadClipPreview(side),delay)}
function setTimelineLoading(){const track=document.getElementById('clipFrameTrack'),count=10;track.className='clip-track';track.innerHTML='';for(let i=0;i<count;i++){const frame=document.createElement('div');frame.className='clip-frame pending';frame.dataset.index=String(i);track.appendChild(frame)}}
function getTimelineOrder(count){const order=[];for(let left=0,right=count-1;left<=right;left++,right--){order.push(left);if(right!==left)order.push(right)}return order}
async function loadClipTimeline(){if(!clipState)return;const seq=++clipTimelineSeq,count=10,order=getTimelineOrder(count);for(const index of order){if(!clipState||seq!==clipTimelineSeq)return;try{const r=await fetch('/api/videos/'+encodeURIComponent(clipState.video.id)+'/clip/timeline',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({frameCount:count,frameIndex:index})});const data=await r.json().catch(()=>({}));if(!clipState||seq!==clipTimelineSeq)return;if(!r.ok||data.success===false||!Array.isArray(data.frames)||data.frames.length===0)throw new Error(data.error||'时间轴预览生成失败');renderTimelineFrame(data.frames[0])}catch(err){markTimelineFrameFailed(index)}}}
function renderTimelineFrame(f){const frame=document.querySelector('.clip-frame[data-index="'+f.index+'"]');if(!frame)return;frame.className='clip-frame';frame.innerHTML='';const img=document.createElement('img');img.src=f.url+'?t='+Date.now();img.alt='时间轴 '+formatDuration(f.seconds);frame.title=formatDuration(f.seconds);frame.appendChild(img)}
function markTimelineFrameFailed(index){const frame=document.querySelector('.clip-frame[data-index="'+index+'"]');if(!frame)return;frame.className='clip-frame pending';frame.textContent='失败'}
function prewarmClipPreviews(side){if(!clipState)return;fetch('/api/videos/'+encodeURIComponent(clipState.video.id)+'/clip/prewarm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({startSeconds:clipState.start,endSeconds:clipState.end,previewSide:side||'both'})}).catch(()=>{})}
function scheduleClipPrewarm(side,delay){clearTimeout(clipPrewarmTimer);clipPrewarmTimer=setTimeout(()=>prewarmClipPreviews(side),delay)}
async function loadClipPreview(side){if(!clipState||clipState.busy)return;side=side||'both';const seq=++clipPreviewSeq[side];if(side==='start'||side==='both')setPreviewBox('clipStartPreview','预览生成中……');if(side==='end'||side==='both')setPreviewBox('clipEndPreview','预览生成中……');try{const r=await fetch('/api/videos/'+encodeURIComponent(clipState.video.id)+'/clip/preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({startSeconds:clipState.start,endSeconds:clipState.end,previewSide:side})});const data=await r.json().catch(()=>({}));if(seq!==clipPreviewSeq[side])return;if(!r.ok||data.success===false)throw new Error(data.error||'预览失败');if(data.startPreviewUrl)setPreviewBox('clipStartPreview','<img alt="裁剪后第一帧预览" src="'+data.startPreviewUrl+'?t='+Date.now()+'">');if(data.endPreviewUrl)setPreviewBox('clipEndPreview','<img alt="裁剪后最后一帧预览" src="'+data.endPreviewUrl+'?t='+Date.now()+'">');document.getElementById('clipError').classList.remove('active')}catch(err){if(seq!==clipPreviewSeq[side])return;if(side==='start'||side==='both')setPreviewBox('clipStartPreview','预览失败');if(side==='end'||side==='both')setPreviewBox('clipEndPreview','预览失败');showClipError(friendlyFetchError(err,'预览失败，不影响继续拖动'))}}
function showClipError(msg){const el=document.getElementById('clipError');el.textContent=msg;el.classList.add('active')}
async function submitClip(){if(!clipState||clipState.busy)return;clipState.busy=true;document.getElementById('clipDialogWrap').classList.add('busy');text('clipBusyText','监控端正在剪辑中，请稍候……');try{const r=await fetch('/api/videos/'+encodeURIComponent(clipState.video.id)+'/clip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({startSeconds:clipState.start,endSeconds:clipState.end})});const data=await r.json().catch(()=>({}));if(!r.ok||data.success===false)throw new Error(data.error||'剪辑启动失败');clipState.taskId=data.taskId;pollClipTask()}catch(err){clipState.busy=false;document.getElementById('clipDialogWrap').classList.remove('busy');showClipError(friendlyFetchError(err,'剪辑启动失败'))}}
async function pollClipTask(){if(!clipState||!clipState.taskId)return;try{const r=await fetch('/api/clip-tasks/'+encodeURIComponent(clipState.taskId));const data=await r.json().catch(()=>({}));if(data.status==='completed'&&data.downloadUrl){const url=data.downloadUrl;closeClipDialog(true);window.location.href=url;return}if(data.status==='failed'){clipState.busy=false;document.getElementById('clipDialogWrap').classList.remove('busy');showClipError(data.message||'剪辑失败');return}if(data.status==='canceled'){closeClipDialog(true);return}text('clipBusyText',data.message||'监控端正在剪辑中，请稍候……');clipPollTimer=setTimeout(pollClipTask,1000)}catch(err){clipPollTimer=setTimeout(pollClipTask,1500)}}
async function cancelClipTask(){if(!clipState||!clipState.busy)return;if(!confirm('确定要取消本次剪辑吗？'))return;if(clipState.taskId){try{await fetch('/api/clip-tasks/'+encodeURIComponent(clipState.taskId)+'/cancel',{method:'POST'})}catch{}}closeClipDialog(true)}
function closeClipDialog(force){if(clipState&&clipState.busy&&!force){cancelClipTask();return}Object.keys(clipPreviewTimers).forEach(k=>clearTimeout(clipPreviewTimers[k]));clipTimelineSeq++;clearTimeout(clipPollTimer);clearTimeout(clipPrewarmTimer);clipState=null;document.getElementById('clipOverlay').classList.remove('active');document.getElementById('clipDialogWrap').classList.remove('busy')}
function closePlayer(e){if(e&&e.target!==document.getElementById('playerOverlay'))return;const player=document.getElementById('videoPlayer');player.pause();player.src='';clearPlayerMessage();document.getElementById('playerOverlay').classList.remove('active')}function downloadVideo(id){window.open('/api/videos/'+encodeURIComponent(id)+'/download','_blank')}document.addEventListener('keydown',e=>{if(e.key==='Escape'){const overlay=document.getElementById('transcodeConfirmOverlay');if(overlay&&overlay.classList.contains('active'))return;closePlayer()}})
</script>
